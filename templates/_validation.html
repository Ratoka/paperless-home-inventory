{% set conf = result.confidence %}
<div class="p-3 rounded bg-light validation-{{ conf }} mb-3">
  <div class="d-flex justify-content-between align-items-start">
    <div>
      {% if result.found %}
        <span class="badge bg-success mb-1">✓ Product found</span>
      {% elif conf == 'error' %}
        <span class="badge bg-secondary mb-1">Search error</span>
      {% else %}
        <span class="badge bg-danger mb-1">Not found in knowledge base</span>
      {% endif %}
      <p class="small mb-1 mt-1">{{ result.summary }}</p>
      {% for r in result.related %}
        <p class="small text-muted mb-0">• {{ r }}</p>
      {% endfor %}
    </div>
  </div>
  {% if result.url %}
  <a href="{{ result.url }}" target="_blank" rel="noopener"
     class="btn btn-sm btn-outline-secondary mt-2">
    Verify on DuckDuckGo ↗
  </a>
  {% endif %}
</div>
